server.port=8080

spring.application.name=api-gateway

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webflux.routes[0].id=user-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/users/**,/api/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=train-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://train-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/trains/**

spring.cloud.gateway.server.webflux.routes[2].id=reservation-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://reservation-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/reservations/**

spring.cloud.gateway.server.webflux.routes[3].id=payment-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://payment-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/payments/**


eureka.client.service-url.defaultZone=http://localhost:8761/eureka/